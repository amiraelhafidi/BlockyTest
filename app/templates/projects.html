<!DOCTYPE html>
<html>
<head> 
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <title>Projects</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/projects.css') }}">
</head>
<body>
<header class="nav_bar">
    <h1 class="logo_text">BlockyTest</h1>
    <img src="{{ url_for('static', filename='img/image.png') }}" alt="Logo" class="header_logo">
</header>

    <main>

 <!-- BOVENSTE BALK -->
    <div class="projects_header">
        <h2>Mijn projecten</h2>
        <a href="{{ url_for('projects.add_project') }}" class="add_button">+</a>
    </div>

    <!-- BOX MET CARDS -->
    <div class="projects_box">
        {% if projects %} 
            <div class="grid"> 
                {% for project in projects %} 
                    <a href="{{ url_for('blockly.editor', project_id=project.testflow_id) }}" style="text-decoration: none; color: inherit;">
                        <div class="card">
                            <p class="project_name">{{ project.name }}</p>
                            <p class="project_description">{{ project.description }}</p>
                        </div>
                    </a>
                {% endfor %}
            </div>
                </div>
            {% else %} 
                <p>Er zijn nog geen projecten toegevoegd. Klik op '+' om een project toe te voegen.</p>
            {% endif %}
        </div>
    </main>

</body>
</html>
