<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockly Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/blockly.css') }}">
</head>
<body>

<header class="header">
    <div class="header-left">
        <a href="{{ url_for('main.index') }}" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
            <img src="{{ url_for('static', filename='img/Wail-Salutem-foundation-logo.webp') }}" alt="Logo" class="logo">
            <h2 class="app-title">BlockyTest</h2>
        </a>
    </div>
    <div class="header-right">
        <a href="{{ url_for('projects.overview') }}" class="header-btn" title="Terug naar projectenoverzicht">Mijn projecten</a>
        <button type="button" class="header-btn" onclick="saveWorkspace()" title="Project opslaan (Ctrl+S)">Opslaan</button>
        <button type="button" class="header-btn" onclick="loadWorkspace()" title="Een ander project openen">Openen</button>
    </div>
</header>

<div class="project-header">
    <a href="{{ url_for('projects.overview') }}" class="back-link" title="Terug naar projectenoverzicht">← Terug</a>
    <span class="project-label">Project:</span>
    <h1>{% if project_name %}{{ project_name }}{% else %}Blokken{% endif %}</h1>
</div>
<div class="container">
    <div class="workspace">
        <div id="blocklyDiv"></div>
        <div class="workspace-hint" id="workspaceHint">Sleep een blok vanuit de toolbox om te beginnen</div>
    </div>
    <div class="right-panel">
        <div id="code-panel">
            <div class="code-panel-header">
                <b>Gegenereerde code</b>
                <button type="button" id="copyCodeBtn" class="copy-btn" onclick="copyCode()" title="Code kopiëren naar klembord">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    Kopie
                </button>
            </div>
            <textarea id="pythonCode" readonly></textarea>
        </div>
        <div id="results-section">
            <div class="results-title">
                <b>Test resultaten</b>
                <div>
                    <button type="button" id="runBtn" class="btn-primary" onclick="runTest()" title="Test uitvoeren">Run</button>
                    <a href="{{ url_for('blockly.geschiedenis', project_id=project_id) }}" class="btn-secondary" style="margin-left: 6px;" title="Bekijk eerdere testresultaten">Geschiedenis</a>
                </div>
            </div>
            <div id="results-panel">
                <div id="testResults">
                <p class="result-placeholder">Klik op "Run" om de test uit te voeren</p>
                </div>
            </div>
        </div>
    </div>
</div>

<xml id="toolbox">
    <category name="Structuur" colour="#F3D500">
        <block type="controls_if"></block>
        <block type="logic_compare"></block>
    </category>

    <category name="Browser" colour="#2D9CDB">
        <block type="close_browser"></block>
        <block type="maximize_window"></block>
        <block type="open_browser"></block>
        <block type="capture_screenshot"></block>
    </category>

    <category name="Acties" colour="#F2994A">
        <block type="wait_seconds"></block>
        <block type="input_text"></block>
        <block type="click_element"></block>
        <block type="wait_for_element"></block>
    </category>

    <category name="Controleren" colour="#27AE60">
        <block type="assert_title"></block>
    </category>

    <category name="Waarden" colour="#828282">
        <block type="text"></block>
        <block type="math_number"></block>
    </category>
</xml>


<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
<script src="https://unpkg.com/blockly/python_compressed.js"></script>

<script src="{{ url_for('static', filename='js/custom_blocks.js') }}"></script>
<script src="{{ url_for('static', filename='js/blockly_editor.js') }}"></script>



<script>
// Hint element beheren - toon/verberg message als geen blokken
const hint = document.getElementById('workspaceHint');
const updateHint = () => {
    if (hint) hint.style.display = workspace.getAllBlocks().length ? 'none' : 'block';
};

// Update hint wanneer workspace verandert
workspace.addChangeListener(event => !event.isUiEvent && updateHint());
updateHint();

// Tooltips voor Blockly categorieën
const categoryTooltips = {
    'Structuur': 'Basisopbouw: wachten, herhalingen en voorwaarden',
    'Browser': 'Browser openen, sluiten en venster maximaliseren',
    'Acties': 'Klikken, typen en interacties met de pagina',
    'Controleren': 'Controleer of iets klopt op de pagina',
    'Waarden': 'Tekst, getallen en variabelen voor je test'
};

// Voeg tooltips toe na Blockly laad (1 seconde delay)
setTimeout(() => {
    document.querySelectorAll('.blocklyTreeRow, .blocklyToolboxCategory').forEach(row => {
        const category = row.textContent.trim().split(/\s+/)[0];
        if (categoryTooltips[category]) {
            row.title = categoryTooltips[category];
        }
    });
}, 1000);
</script>

</body>
</html>
