<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockly Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/blockly.css') }}">
</head>
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<script src="https://unpkg.com/blockly/python_compressed.js"></script>
<script src="{{ url_for('static', filename='js/custom_blocks.js') }}"></script>
<body>

<header class="header">
    <div class="header-left">
        <img src="{{ url_for('static', filename='img/Wail-Salutem-foundation-logo.webp') }}" alt="Logo" class="logo">
        <h2 class="app-title">BlockyTest</h2>
    </div>
    <div class="header-right">
        <a href="{{ url_for('projects.overview') }}" class="header-btn">Mijn projecten</a>
        <button type="button" class="header-btn" onclick="saveWorkspace()">Opslaan</button>
        <button type="button" class="header-btn" onclick="loadWorkspace()">Laden</button>
        <button type="button" class="header-btn" id="runBtn" onclick="runTest()">Run</button>
        <a href="{{ url_for('blockly.geschiedenis') }}" class="header-btn" style="text-decoration: none;">Geschiedenis</a>
    </div>
</header>

<h1>{% if project_name %}{{ project_name }}{% else %}Blokken{% endif %}</h1>
<div class="container">
    <div class="workspace">
        <div id="blocklyDiv"></div>
    </div>
    <div class="right-panel">
        <div id="code-panel">
            <div class="code-panel-header">
                <b>Gegenereerde code</b>
                <button type="button" id="copyCodeBtn" class="copy-btn" onclick="copyCode()" title="Code naar klembord">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    Kopie
                </button>
            </div>
            <textarea id="pythonCode" readonly></textarea>
        </div>
        <div id="results-section">
            <div class="results-title">
                <b>Test resultaten</b>
            </div>
            <div id="results-panel">
                <div id="testResults">
                <p class="result-placeholder">Klik op "Run" om de test uit te voeren</p>
                </div>
            </div>
        </div>
    </div>
</div>

<xml id="toolbox">
    <block type="controls_if"></block>
    <block type="logic_compare"></block>
    <block type="math_number"></block>
    <block type="text"></block>
    <block type="close_browser"></block>
    <block type="maximize_window"></block>
    <block type="wait_seconds"></block>
    <block type="assert_title"></block>
</xml>

<script>
const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });
const pythonCodeField = document.getElementById('pythonCode');

function getWorkspaceXml() {
    const xml = Blockly.Xml.workspaceToDom(workspace);
    return Blockly.Xml.domToText(xml);
}

function updateGeneratedCode() {
    const code = Blockly.Python.workspaceToCode(workspace);
    pythonCodeField.value = code || '# Connect blocks to generate code...';
}

workspace.addChangeListener(function(event) {
    if (event.isUiEvent) return;
    updateGeneratedCode();
});

updateGeneratedCode();

function saveWorkspace() {
    fetch('/blockly/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workspace_xml: getWorkspaceXml() })
    }).then(r => r.json()).then(d => alert(d.message));
}

function loadWorkspace() {
    fetch('/blockly/load')
        .then(r => r.json())
        .then(d => {
            workspace.clear();

            if (d.workspace_xml) {
                const xml = Blockly.utils.xml.textToDom(d.workspace_xml);
                Blockly.Xml.domToWorkspace(xml, workspace);
            }

            updateGeneratedCode();
        });
}

function runTest() {
    const runBtn = document.getElementById('runBtn');
    
    runBtn.disabled = true;
    runBtn.classList.add('loading');
    renderResultsPanel({ message: 'Test loopt...' });
    
    fetch('/blockly/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workspace_xml: getWorkspaceXml() })
    })
    .then(r => r.json())
    .then(data => {
        runBtn.classList.remove('loading');
        runBtn.disabled = false;
        
        if (data.fout) {
            renderResultsPanel({
                statusText: 'Fout',
                statusClass: 'error',
                output: data.fout
            });
        } else {
            const statusClass = data.return_code === 0 ? 'success' : 'error';
            const statusText = data.return_code === 0 ? 'Geslaagd' : 'Gefaald';
            renderResultsPanel({
                statusText,
                statusClass,
                output: data.output
            });
        }
    })
    .catch(e => {
        runBtn.classList.remove('loading');
        runBtn.disabled = false;
        renderResultsPanel({
            statusText: 'Fout',
            statusClass: 'error',
            output: e.message
        });
    });
}

function escapeHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function renderResultsPanel({ message = '', statusText = '', statusClass = '', output = '' } = {}) {
    const resultsPanel = document.getElementById('testResults');

    if (message) {
        resultsPanel.innerHTML = `<p class="result-placeholder">${escapeHtml(message)}</p>`;
        return;
    }

    const statusMarkup = statusText
        ? `<p class="result-status ${statusClass}">${escapeHtml(statusText)}</p>`
        : '';
    const outputMarkup = output
        ? `<textarea id="testResultsOutput" readonly>${escapeHtml(output)}</textarea>`
        : '<p class="result-placeholder">Geen uitvoer beschikbaar</p>';

    resultsPanel.innerHTML = `${statusMarkup}${outputMarkup}`;
}

function copyCode() {
    const code = pythonCodeField.value;
    const btn = document.getElementById('copyCodeBtn');
    
    if (!code || code.includes('Connect blocks to generate code')) {
        alert('Er is geen code om te kopieëren. Voeg blokken toe en probeer opnieuw.');
        return;
    }
    
    navigator.clipboard.writeText(code).then(() => {
        btn.style.opacity = '0.5';
        
        setTimeout(() => {
            btn.style.opacity = '1';
        }, 2000);
    }).catch(err => {
        alert('Kan niet naar klembord kopieëren: ' + err);
    });
}

</script>


<!--  Javascript which clears the Blockly workspace, but also saves it in the database if wanted. -->
<script>
function clearWorkspace() {
    const confirmed = confirm("Weet je zeker dat je alle blokken wilt verwijderen?");

    if (!confirmed) {
        return;
    }

    const workspace = Blockly.getMainWorkspace();
    workspace.clear();

    const xml = Blockly.Xml.workspaceToDom(workspace);
    const xmlText = Blockly.Xml.domToText(xml);

    fetch('/blockly/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workspace_xml: xmlText })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);
        alert("Alle blokken zijn verwijderd en opgeslagen.");
    })
    .catch(error => {
        console.error(error);
        alert("De workspace is gewist, maar opslaan is mislukt.");
    });
}
</script>

</body>
</html>
