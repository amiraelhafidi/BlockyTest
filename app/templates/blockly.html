<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockly Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/blockly.css') }}">
</head>
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<script src="https://unpkg.com/blockly/python_compressed.js"></script>
<body>

<header class="header">
    <div class="header-left">
        <img src="{{ url_for('static', filename='img/Wail-Salutem-foundation-logo.webp') }}" alt="Logo" class="logo">
        <h2 class="app-title">BlockyTest</h2>
    </div>
    <div class="header-right">
        <button type="button" class="header-btn" onclick="saveWorkspace()">Opslaan</button>
        <button type="button" class="header-btn" onclick="loadWorkspace()">Laden</button>
        <button type="button" class="header-btn">Keywords</button>
        <button type="button" class="header-btn" id="runBtn" onclick="runTest()">Run</button>
        <button type="button" class="header-btn">Export</button>
    </div>
</header>

<h1>{% if project_name %}{{ project_name }}{% else %}Blokken{% endif %}</h1>
<div class="container">
    <div class="workspace">
        <div id="blocklyDiv"></div>
    </div>
    <div class="right-panel">
        <div id="code-panel">
            <b>Gegenereerde code:</b>
            <textarea id="pythonCode" readonly></textarea>
        </div>
        <div id="results-panel">
            <b>Test resultaten</b>
            <div id="testResults">
                <p>Klik op "Run" om de test uit te voeren</p>
            </div>
        </div>
    </div>
</div>

<xml id="toolbox">
    <block type="controls_if"></block>
    <block type="logic_compare"></block>
    <block type="math_number"></block>
    <block type="text"></block>
</xml>

<script>
const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });

workspace.addChangeListener(function(event) {
    if (event.isUiEvent) return;
    const code = Blockly.Python.workspaceToCode(workspace);
    document.getElementById('pythonCode').value = code || '# Connect blocks to generate code...';
});

function saveWorkspace() {
    const xml = Blockly.Xml.workspaceToDom(Blockly.getMainWorkspace());
    const xmlText = Blockly.Xml.domToText(xml);
    fetch('/blockly/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workspace_xml: xmlText })
    }).then(r => r.json()).then(d => alert(d.message));
}

function loadWorkspace() {
    fetch('/blockly/load')
        .then(r => r.json())
        .then(d => {
            if (d.workspace_xml) {
                Blockly.getMainWorkspace().clear();
                const xml = Blockly.utils.xml.textToDom(d.workspace_xml);
                Blockly.Xml.domToWorkspace(xml, Blockly.getMainWorkspace());
            }
        });
}

function runTest() {
    const xml = Blockly.Xml.workspaceToDom(workspace);
    const xmlText = Blockly.Xml.domToText(xml);
    const runBtn = document.getElementById('runBtn');
    const resultsPanel = document.getElementById('testResults');
    
    // Disable button en set loading state
    runBtn.disabled = true;
    runBtn.classList.add('loading');
    resultsPanel.classList.add('loading');
    resultsPanel.innerHTML = '<p>Test loopt...</p>';
    
    fetch('/blockly/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workspace_xml: xmlText })
    })
    .then(r => r.json())
    .then(data => {
        resultsPanel.classList.remove('loading');
        runBtn.classList.remove('loading');
        runBtn.disabled = false;
        
        if (data.fout) {
            resultsPanel.classList.add('error');
            resultsPanel.innerHTML = `<p style="color: #e74c3c; font-weight: bold;">Fout</p><p style="color: #e74c3c;">${data.fout}</p>`;
        } else {
            // Toon visuele status feedback (groen/rood)
            resultsPanel.classList.remove('error');
            const statusColor = data.gefaald === 0 ? '#27ae60' : '#e74c3c';
            const statusText = data.gefaald === 0 ? 'GESLAAGD' : 'GEFAALD';
            
            if (data.gefaald === 0) {
                resultsPanel.classList.add('success');
            } else {
                resultsPanel.classList.add('error');
            }
            
            const html = `
                <p style="font-size: 16px; color: ${statusColor}; font-weight: bold;">${statusText}</p>
                <p style="margin: 8px 0;">Geslaagd: <strong>${data.geslaagd}</strong></p>
                <p style="margin: 8px 0;">Gefaald: <strong>${data.gefaald}</strong></p>
                <textarea readonly style="width: 100%; height: 120px; font-size: 11px; font-family: monospace; border: 1px solid #ddd; padding: 8px; resize: none;">${data.output}</textarea>
            `;
            document.getElementById('testResults').innerHTML = html;
        }
    })
    .catch(e => {
        resultsPanel.classList.remove('loading');
        resultsPanel.classList.add('error');
        runBtn.classList.remove('loading');
        runBtn.disabled = false;
        document.getElementById('testResults').innerHTML = `<p style="color: #e74c3c; font-weight: bold;">Fout</p><p style="color: #e74c3c;">${e.message}</p>`;
    });
}

</script>

<!--  Javascript which clears the Blockly workspace, but also saves it in the database if wanted. -->
<script>
function clearWorkspace() {
    const confirmed = confirm("Weet je zeker dat je alle blokken wilt verwijderen?");

    if (!confirmed) {
        return;
    }

    const workspace = Blockly.getMainWorkspace();
    workspace.clear();

    const xml = Blockly.Xml.workspaceToDom(workspace);
    const xmlText = Blockly.Xml.domToText(xml);

    fetch('/blockly/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workspace_xml: xmlText })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);
        alert("Alle blokken zijn verwijderd en opgeslagen.");
    })
    .catch(error => {
        console.error(error);
        alert("De workspace is gewist, maar opslaan is mislukt.");
    });
}
</script>
</body>
</html>
