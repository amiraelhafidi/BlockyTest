<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Blockly Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/blockly.css') }}">
</head>
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<script src="https://unpkg.com/blockly/python_compressed.js"></script>
<body>

<header class="header">
    <div class="header-left">
        <img src="{{ url_for('static', filename='img/Wail-Salutem-foundation-logo.webp') }}" alt="Logo" class="logo">
        <h2 class="app-title">BlockyTest</h2>
    </div>
    <div class="header-right">
        <button type="button" class="header-btn" onclick="saveWorkspace()">Opslaan</button>
        <button type="button" class="header-btn" onclick="loadWorkspace()">Laden</button>
        <button type="button" class="header-btn">Keywords</button>
        <button type="button" class="header-btn">Run</button>
        <button type="button" class="header-btn">Export</button>
    </div>
</header>

<h1>{% if project_name %}{{ project_name }}{% else %}Blokken{% endif %}</h1>
<div class="container">
    <div class="workspace">
        <div id="blocklyDiv"></div>
    </div>
    <div class="right-panel">
        <div id="code-panel">
            <b>Gegenereerde code:</b>
            <textarea id="pythonCode" readonly></textarea>
        </div>
        <div id="results-panel">
            <b>Test resultaten</b>
            <div id="testResults">
                <p>Klik op "Run" om de test uit te voeren</p>
            </div>
        </div>
    </div>
</div>

<xml id="toolbox">
    <block type="controls_if"></block>
    <block type="logic_compare"></block>
    <block type="math_number"></block>
    <block type="text"></block>
</xml>

<script>
const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });

workspace.addChangeListener(function(event) {
    if (event.isUiEvent) return;
    const code = Blockly.Python.workspaceToCode(workspace);
    document.getElementById('pythonCode').value = code || '# Connect blocks to generate code...';
});

function saveWorkspace() {
    const xml = Blockly.Xml.workspaceToDom(Blockly.getMainWorkspace());
    const xmlText = Blockly.Xml.domToText(xml);
    fetch('/blockly/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workspace_xml: xmlText })
    }).then(r => r.json()).then(d => alert(d.message));
}

function loadWorkspace() {
    fetch('/blockly/load')
        .then(r => r.json())
        .then(d => {
            if (d.workspace_xml) {
                Blockly.getMainWorkspace().clear();
                const xml = Blockly.utils.xml.textToDom(d.workspace_xml);
                Blockly.Xml.domToWorkspace(xml, Blockly.getMainWorkspace());
            }
        });
}

</script>

<!--  Javascript which clears the Blockly workspace, but also saves it in the database if wanted. -->
<script>
function clearWorkspace() {
    const confirmed = confirm("Weet je zeker dat je alle blokken wilt verwijderen?");

    if (!confirmed) {
        return;
    }

    const workspace = Blockly.getMainWorkspace();
    workspace.clear();

    const xml = Blockly.Xml.workspaceToDom(workspace);
    const xmlText = Blockly.Xml.domToText(xml);

    fetch('/blockly/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workspace_xml: xmlText })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);
        alert("Alle blokken zijn verwijderd en opgeslagen.");
    })
    .catch(error => {
        console.error(error);
        alert("De workspace is gewist, maar opslaan is mislukt.");
    });
}
</script>
</body>
</html>
