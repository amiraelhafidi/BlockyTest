<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <title>{% if is_edit %}Project bewerken{% else %}Nieuw project{% endif %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/projects.css') }}">
</head>
<body>

<header class="nav_bar">
    <h1 class="logo_text">BlockyTest</h1>
    <img src="{{ url_for('static', filename='img/image.png') }}" alt="Logo" class="header_logo">
</header>

<div class="form_page">
    <div class="form_box">
        <h2 class="form_title">{% if is_edit %}Project bewerken{% else %}Nieuw project toevoegen{% endif %}</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash_messages">
                    {% for category, message in messages %}
                        <div class="flash_message flash_{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" novalidate>
            <label for="name">Projectnaam:</label>

            <input type="text" id="name" name="name" placeholder="Voer een projectnaam in" value="{{ project.name if project else '' }}" required autofocus>

            <label for="description">Beschrijving:</label>

            <textarea id="description" name="description" placeholder="Voer een korte beschrijving in">{{ project.description if project else '' }}</textarea>

            <div class="form_buttons">

                <button type="submit">{% if is_edit %}Project opslaan{% else %}Project aanmaken{% endif %}</button>

                <a href="{{ url_for('projects.overview') }}" class="go_back">Annuleren</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
