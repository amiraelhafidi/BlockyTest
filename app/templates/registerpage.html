<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account aanmaken - BlockyTest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/projects.css') }}">
</head>
<body>

<header class="nav_bar">
    <div class="nav_left">
        <img src="{{ url_for('static', filename='img/image.png') }}" alt="BlockyTest logo" class="header_logo">
        <h1 class="logo_text">BlockyTest</h1>
    </div>
    {% if session.get('user_id') %}
    <div class="nav_right">
        <a href="{{ url_for('projects.logout') }}">Uitloggen</a>
    </div>
    {% endif %}
</header>

<div class="form_page">
    <div class="form_box">
        <h2 class="form_title">Account aanmaken</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash_messages">
                {% for category, message in messages %}
                    <div class="flash_message flash_{{ category }}">{{ message }}</div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('projects.register') }}" novalidate>
            <label for="name">Gebruikersnaam:</label>
            <input type="text" id="name" name="name" value="{{ name }}">

            <label for="email">E-mailadres:</label>
            <input type="email" id="email" name="email" value="{{ email }}">

            <label for="password">Wachtwoord:</label>
            <input type="password" id="password" name="password">

            <div class="form_buttons">
                <button type="submit">Account aanmaken</button>
                <a href="{{ url_for('projects.login') }}" class="go_back">Inloggen</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
